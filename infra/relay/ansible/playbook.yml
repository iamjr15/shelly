---
- name: Deploy Shelly relay
  hosts: shelly_relays
  become: true
  vars_files:
    - group_vars/all/main.yml

  pre_tasks:
    - name: Require relay binary path
      ansible.builtin.assert:
        that:
          - shelly_relay_binary | length > 0
        fail_msg: "Pass -e shelly_relay_binary=/path/to/shelly-relay"

  tasks:
    - name: Create relay group
      ansible.builtin.group:
        name: "{{ shelly_relay_group }}"
        system: true

    - name: Create relay user
      ansible.builtin.user:
        name: "{{ shelly_relay_user }}"
        group: "{{ shelly_relay_group }}"
        shell: /usr/sbin/nologin
        home: "{{ shelly_relay_data_dir }}"
        create_home: false
        system: true

    - name: Create relay data directory
      ansible.builtin.file:
        path: "{{ shelly_relay_data_dir }}"
        state: directory
        owner: "{{ shelly_relay_user }}"
        group: "{{ shelly_relay_group }}"
        mode: "0700"

    - name: Install relay binary
      ansible.builtin.copy:
        src: "{{ shelly_relay_binary }}"
        dest: "{{ shelly_relay_bin_dir }}/shelly-relay"
        owner: root
        group: root
        mode: "0755"
      notify: Restart shelly relay

    - name: Remove unmanaged relay service drop-ins
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/systemd/system/shelly-control-plane.service.d
        - /etc/systemd/system/shelly-iroh-relay.service.d
      notify: Restart shelly relay

    - name: Install HTTP control-plane service
      ansible.builtin.template:
        src: shelly-control-plane.service.j2
        dest: /etc/systemd/system/shelly-control-plane.service
        owner: root
        group: root
        mode: "0644"
      notify: Restart shelly relay

    - name: Install iroh relay service
      ansible.builtin.template:
        src: shelly-iroh-relay.service.j2
        dest: /etc/systemd/system/shelly-iroh-relay.service
        owner: root
        group: root
        mode: "0644"
      notify: Restart shelly relay

    - name: Enable and start relay backend services
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        enabled: true
        state: started
        daemon_reload: true
      loop:
        - shelly-control-plane.service
        - shelly-iroh-relay.service

    - name: Flush relay backend restarts
      ansible.builtin.meta: flush_handlers

    - name: Install Caddy apt prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - curl
          - debian-archive-keyring
          - debian-keyring
          - gnupg
        state: present
        update_cache: true

    - name: Check Caddy apt keyring
      ansible.builtin.stat:
        path: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
      register: caddy_keyring

    - name: Download Caddy stable apt key
      ansible.builtin.get_url:
        url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
        dest: /usr/share/keyrings/caddy-stable-archive-keyring.gpg.asc
        owner: root
        group: root
        mode: "0644"
      register: caddy_apt_key

    - name: Install Caddy stable apt keyring
      ansible.builtin.command:
        cmd: gpg --dearmor --yes -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg /usr/share/keyrings/caddy-stable-archive-keyring.gpg.asc
      when: caddy_apt_key.changed or not caddy_keyring.stat.exists

    - name: Set Caddy apt keyring permissions
      ansible.builtin.file:
        path: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
        owner: root
        group: root
        mode: "0644"

    - name: Install Caddy stable apt source
      ansible.builtin.get_url:
        url: https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt
        dest: /etc/apt/sources.list.d/caddy-stable.list
        owner: root
        group: root
        mode: "0644"

    - name: Install Caddy
      ansible.builtin.apt:
        name: caddy
        state: present
        update_cache: true

    - name: Install Caddy reverse proxy config
      ansible.builtin.template:
        src: Caddyfile.j2
        dest: /etc/caddy/Caddyfile
        owner: root
        group: root
        mode: "0644"
      notify: Reload caddy

    - name: Enable and start Caddy
      ansible.builtin.systemd_service:
        name: caddy.service
        enabled: true
        state: started
        daemon_reload: true

    - name: Flush Caddy reload
      ansible.builtin.meta: flush_handlers

    - name: Verify relay services are active
      ansible.builtin.command: "systemctl is-active {{ item }}"
      register: relay_service_active
      changed_when: false
      failed_when: relay_service_active.stdout != "active"
      retries: 6
      delay: 5
      until: relay_service_active.stdout == "active"
      loop:
        - shelly-control-plane.service
        - shelly-iroh-relay.service
        - caddy.service

  handlers:
    - name: Restart shelly relay
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        state: restarted
        daemon_reload: true
      loop:
        - shelly-control-plane.service
        - shelly-iroh-relay.service

    - name: Reload caddy
      ansible.builtin.systemd_service:
        name: caddy.service
        state: reloaded
