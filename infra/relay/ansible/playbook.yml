---
- name: Deploy Fieldwork relay
  hosts: fieldwork_relays
  become: true
  vars_files:
    - group_vars/all/main.yml

  pre_tasks:
    - name: Require relay binary path
      ansible.builtin.assert:
        that:
          - fieldwork_relay_binary | length > 0
        fail_msg: "Pass -e fieldwork_relay_binary=/path/to/fieldwork-relay"

  tasks:
    - name: Create relay group
      ansible.builtin.group:
        name: "{{ fieldwork_relay_group }}"
        system: true

    - name: Create relay user
      ansible.builtin.user:
        name: "{{ fieldwork_relay_user }}"
        group: "{{ fieldwork_relay_group }}"
        shell: /usr/sbin/nologin
        home: "{{ fieldwork_relay_data_dir }}"
        create_home: false
        system: true

    - name: Create relay data directory
      ansible.builtin.file:
        path: "{{ fieldwork_relay_data_dir }}"
        state: directory
        owner: "{{ fieldwork_relay_user }}"
        group: "{{ fieldwork_relay_group }}"
        mode: "0700"

    - name: Install relay binary
      ansible.builtin.copy:
        src: "{{ fieldwork_relay_binary }}"
        dest: "{{ fieldwork_relay_bin_dir }}/fieldwork-relay"
        owner: root
        group: root
        mode: "0755"
      notify: Restart fieldwork relay

    - name: Remove unmanaged relay service drop-ins
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/systemd/system/fieldwork-control-plane.service.d
        - /etc/systemd/system/fieldwork-iroh-relay.service.d
      notify: Restart fieldwork relay

    - name: Install HTTP control-plane service
      ansible.builtin.template:
        src: fieldwork-control-plane.service.j2
        dest: /etc/systemd/system/fieldwork-control-plane.service
        owner: root
        group: root
        mode: "0644"
      notify: Restart fieldwork relay

    - name: Install iroh relay service
      ansible.builtin.template:
        src: fieldwork-iroh-relay.service.j2
        dest: /etc/systemd/system/fieldwork-iroh-relay.service
        owner: root
        group: root
        mode: "0644"
      notify: Restart fieldwork relay

    - name: Enable and start services
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        enabled: true
        state: started
        daemon_reload: true
      loop:
        - fieldwork-control-plane.service
        - fieldwork-iroh-relay.service

    - name: Flush relay restarts
      ansible.builtin.meta: flush_handlers

    - name: Verify relay services are active
      ansible.builtin.command: "systemctl is-active {{ item }}"
      register: relay_service_active
      changed_when: false
      failed_when: relay_service_active.stdout != "active"
      retries: 6
      delay: 5
      until: relay_service_active.stdout == "active"
      loop:
        - fieldwork-control-plane.service
        - fieldwork-iroh-relay.service

  handlers:
    - name: Restart fieldwork relay
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        state: restarted
        daemon_reload: true
      loop:
        - fieldwork-control-plane.service
        - fieldwork-iroh-relay.service
