repos:
  - repo: local
    hooks:
      - id: cargo-fmt-check
        name: cargo fmt --check
        entry: cargo fmt --check
        language: system
        pass_filenames: false
        always_run: true
      - id: cargo-clippy-workspace
        name: cargo clippy --workspace -- -D warnings
        entry: cargo clippy --workspace -- -D warnings
        language: system
        pass_filenames: false
        always_run: true
      - id: cargo-nextest-workspace
        name: cargo nextest run --workspace --no-fail-fast
        entry: cargo nextest run --workspace --no-fail-fast
        language: system
        pass_filenames: false
        always_run: true
      - id: fieldwork-secret-boundaries
        name: node scripts/verify-secret-boundaries.mjs
        entry: node scripts/verify-secret-boundaries.mjs
        language: system
        pass_filenames: false
        always_run: true
      - id: fieldwork-no-ship-markers
        name: node scripts/verify-no-ship-markers.mjs
        entry: node scripts/verify-no-ship-markers.mjs
        language: system
        pass_filenames: false
        always_run: true
      - id: fieldwork-no-ship-markers-self-test
        name: node scripts/verify-no-ship-markers.mjs --self-test
        entry: node scripts/verify-no-ship-markers.mjs --self-test
        language: system
        pass_filenames: false
        always_run: true
