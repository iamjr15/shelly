repos:
  - repo: local
    hooks:
      - id: cargo-fmt-check
        name: cargo fmt --check
        entry: cargo fmt --check
        language: system
        pass_filenames: false
        always_run: true
      - id: cargo-clippy-workspace
        name: cargo clippy --workspace -- -D warnings
        entry: cargo clippy --workspace -- -D warnings
        language: system
        pass_filenames: false
        always_run: true
      - id: cargo-nextest-workspace
        name: cargo nextest run --workspace --no-fail-fast
        entry: cargo nextest run --workspace --no-fail-fast
        language: system
        pass_filenames: false
        always_run: true
      - id: shelly-npm-dispatcher
        name: node scripts/test-npm-dispatcher.mjs
        entry: node scripts/test-npm-dispatcher.mjs
        language: system
        pass_filenames: false
        always_run: true
      - id: shelly-npm-publish-plan
        name: node scripts/test-npm-publish-plan.mjs
        entry: node scripts/test-npm-publish-plan.mjs
        language: system
        pass_filenames: false
        always_run: true
