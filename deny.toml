[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"
ignore = [
  # v1 local IPC and local encrypted/plaintext persistence are contractually
  # bincode. The protocol crate centralizes bincode 2 with legacy config to keep
  # the v1 wire layout stable; track removal only if PLAN.md changes the
  # protocol/storage contract.
  "RUSTSEC-2025-0141",
  # Pulled by tattoy-wezterm-term through miniz_oxide 0.7. No safe upgrade is
  # available from the terminal-state stack today.
  "RUSTSEC-2025-0056",
  # Transitive through iroh's Linux network discovery stack and image codecs used
  # by QR/terminal dependencies. No direct Fieldwork usage.
  "RUSTSEC-2024-0436",
]
# cargo audit also warns on RUSTSEC-2026-0002 for lru 0.12.5 through
# tattoy-wezterm-term. cargo-deny treats it as a warning, not an ignored
# advisory here. A dry-run update found no compatible lockfile move; track this
# with the terminal-state stack and do not use lru::IterMut directly.

[licenses]
version = 2
allow = [
  "0BSD",
  "AGPL-3.0-or-later",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "NCSA",
  "Unlicense",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "WTFPL",
  "Zlib"
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
