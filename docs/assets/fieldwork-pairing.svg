<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Fieldwork QR pairing with explicit approval</title>
  <desc id="desc">A pairing screenshot showing a terminal QR code, phone scan state, and desktop approval prompt.</desc>
  <rect width="1280" height="720" fill="#eef5f2"/>
  <rect x="72" y="72" width="720" height="576" rx="16" fill="#11161a"/>
  <rect x="72" y="72" width="720" height="54" rx="16" fill="#20272e"/>
