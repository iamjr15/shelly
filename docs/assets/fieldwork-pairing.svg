  <text x="112" y="520" font-family="Menlo, Consolas, monospace" font-size="22" fill="#9fb4c8">Pair request from "Jamie iPhone" - approve? [y/N]</text>
  <text x="112" y="565" font-family="Menlo, Consolas, monospace" font-size="22" fill="#d6e0ea">y</text>
