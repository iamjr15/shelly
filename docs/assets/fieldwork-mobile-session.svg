  <rect x="260" y="170" width="192" height="92" rx="14" fill="#eaf4ef"/>
  <text x="278" y="204" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#14231c">claude-api</text>
  <text x="278" y="232" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" fill="#1c7c5b">Working</text>
  <text x="278" y="250" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#53615c">npm test -- --watch</text>
  <rect x="260" y="282" width="192" height="92" rx="14" fill="#f0f1f3"/>
  <text x="278" y="316" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#14231c">bash</text>
  <text x="278" y="344" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" fill="#68727d">Idle</text>
  <text x="278" y="362" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#68727d">~/projects/fieldwork</text>
  <rect x="260" y="394" width="192" height="92" rx="14" fill="#fff4dd"/>
  <text x="278" y="428" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#14231c">codex</text>
  <text x="278" y="456" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" fill="#a86200">Awaiting input</text>
  <text x="278" y="474" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#68727d">A session is waiting.</text>
  <rect x="784" y="48" width="280" height="624" rx="42" fill="#11161a"/>
  <rect x="804" y="82" width="240" height="556" rx="30" fill="#101418"/>
  <text x="834" y="132" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19" font-weight="700" fill="#ffffff">claude-api</text>
  <text x="834" y="160" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#87d787">live attach</text>
  <g font-family="Menlo, Consolas, monospace" font-size="13">
    <text x="830" y="214" fill="#9fb4c8">$ cargo nextest run</text>
    <text x="830" y="240" fill="#9fb4c8">running 88 tests</text>
    <text x="830" y="266" fill="#87d787">PASS protocol round trips</text>
    <text x="830" y="292" fill="#87d787">PASS pty replay</text>
    <text x="830" y="318" fill="#87d787">PASS relay payload privacy</text>
    <text x="830" y="370" fill="#d6e0ea">Claude is waiting for input.</text>
    <text x="830" y="396" fill="#d6e0ea">Continue with release notes?</text>
    <text x="830" y="448" fill="#87d787">$ y</text>
  </g>
