<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Fieldwork mobile sessions and terminal attach</title>
  <desc id="desc">Two phone screenshots showing the session dashboard and a live attached terminal.</desc>
  <rect width="1280" height="720" fill="#f2f4f7"/>
  <rect x="216" y="48" width="280" height="624" rx="42" fill="#11161a"/>
  <rect x="236" y="82" width="240" height="556" rx="30" fill="#ffffff"/>
