name: Release iOS

on:
  push:
    tags:
      - "ios-v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  testflight:
    name: Build and upload TestFlight
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      FIELDWORK_IOS_RELEASE_XCODE_MAJOR: "26"
      FIELDWORK_IOS_RELEASE_SDK_MAJOR: "26"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: Swatinem/rust-cache@v2
      - name: Verify Xcode toolchain
        run: scripts/check-ios-prereqs.sh --release
      - name: Verify mobile privacy defaults
        run: node scripts/verify-mobile-privacy.mjs
      - name: Verify store privacy answer sheet
        run: node scripts/verify-store-privacy.mjs
      - name: Verify telemetry privacy wiring
        run: node scripts/verify-telemetry-privacy.mjs
      - name: Build Rust xcframework
        run: apps/ios/scripts/build-rust.sh
      - name: Verify xcframework slices
        run: |
          plutil -convert json -o - apps/ios/GeneratedRust/FieldworkCore.xcframework/Info.plist | jq -e '
            .AvailableLibraries as $libs |
            any($libs[]; .SupportedPlatform == "ios" and (.SupportedArchitectures | index("arm64"))) and
            any($libs[]; .SupportedPlatform == "ios" and .SupportedPlatformVariant == "simulator" and (.SupportedArchitectures | index("arm64")) and (.SupportedArchitectures | index("x86_64")))
          '
      - name: Verify mobile Sentry DSN
        env:
          FIELDWORK_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          if [ -z "$FIELDWORK_SENTRY_DSN" ]; then
            echo "SENTRY_DSN is required so opt-in mobile crash reporting works in release builds."
            exit 1
          fi
      - name: Install Apple signing assets
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
        run: |
          if [ -z "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" ] || \
             [ -z "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" ] || \
             [ -z "$IOS_PROVISIONING_PROFILE_BASE64" ] || \
             [ -z "$IOS_DEVELOPMENT_TEAM" ]; then
            echo "iOS distribution certificate, provisioning profile, and development team secrets are required."
            exit 1
          fi

          keychain="$RUNNER_TEMP/fieldwork-ios-signing.keychain-db"
          keychain_password="$(uuidgen)"
          cert_path="$RUNNER_TEMP/fieldwork-ios-distribution.p12"
          profile_path="$RUNNER_TEMP/fieldwork.mobileprovision"
          profile_plist="$RUNNER_TEMP/fieldwork-profile.plist"

          echo "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > "$cert_path"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$profile_path"
          chmod 600 "$cert_path" "$profile_path"

          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$cert_path" \
            -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain"
          security list-keychains -d user -s "$keychain" login.keychain
          security default-keychain -s "$keychain"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$profile_path" > "$profile_plist"
          profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print UUID' "$profile_plist")"
          profile_name="$(/usr/libexec/PlistBuddy -c 'Print Name' "$profile_plist")"
          app_identifier="$(/usr/libexec/PlistBuddy -c 'Print Entitlements:application-identifier' "$profile_plist" 2>/dev/null || true)"
          aps_environment="$(/usr/libexec/PlistBuddy -c 'Print Entitlements:aps-environment' "$profile_plist" 2>/dev/null || true)"
          if [ "$app_identifier" != "$IOS_DEVELOPMENT_TEAM.app.fieldwork.ios" ]; then
            echo "Provisioning profile application identifier must be $IOS_DEVELOPMENT_TEAM.app.fieldwork.ios, got: ${app_identifier:-missing}"
            exit 1
          fi
          if [ "$aps_environment" != "production" ]; then
            echo "Provisioning profile must include production aps-environment for APNs, got: ${aps_environment:-missing}"
            exit 1
          fi
          cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.mobileprovision"

          {
            echo "FIELDWORK_IOS_KEYCHAIN=$keychain"
            echo "IOS_DEVELOPMENT_TEAM=$IOS_DEVELOPMENT_TEAM"
            echo "IOS_PROVISIONING_PROFILE_UUID=$profile_uuid"
            echo "IOS_PROVISIONING_PROFILE_NAME=$profile_name"
          } >> "$GITHUB_ENV"
      - name: Build archive
        env:
          FIELDWORK_SKIP_RUST_BUILD: "1"
          FIELDWORK_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          xcodebuild \
            -project apps/ios/Fieldwork.xcodeproj \
            -scheme Fieldwork \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Fieldwork.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$IOS_DEVELOPMENT_TEAM" \
            PROVISIONING_PROFILE="$IOS_PROVISIONING_PROFILE_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_NAME" \
            OTHER_CODE_SIGN_FLAGS="--keychain $FIELDWORK_IOS_KEYCHAIN"
      - name: Export IPA
        env:
          EXPORT_OPTIONS_PLIST: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST }}
        run: |
          if [ -z "$EXPORT_OPTIONS_PLIST" ]; then
            echo "IOS_EXPORT_OPTIONS_PLIST is required to export the signed iOS archive."
            exit 1
          fi
          echo "$EXPORT_OPTIONS_PLIST" > ExportOptions.plist
          chmod 600 ExportOptions.plist
          plutil -lint ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath build/Fieldwork.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export
      - name: Upload to TestFlight
        env:
          APP_STORE_KEY_JSON: ${{ secrets.APP_STORE_KEY_JSON }}
        run: |
          if [ -z "$APP_STORE_KEY_JSON" ]; then
            echo "APP_STORE_KEY_JSON is required to upload the IPA to TestFlight."
            exit 1
          fi
          app_store_key_json="$RUNNER_TEMP/fieldwork-app-store-key.json"
          echo "$APP_STORE_KEY_JSON" > "$app_store_key_json"
          chmod 600 "$app_store_key_json"
          jq -e '.key_id and .issuer_id and .private_key' "$app_store_key_json" > /dev/null
          key_id="$(jq -r .key_id "$app_store_key_json")"
          issuer_id="$(jq -r .issuer_id "$app_store_key_json")"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          app_store_private_key="$HOME/.appstoreconnect/private_keys/AuthKey_${key_id}.p8"
          jq -r .private_key "$app_store_key_json" > "$app_store_private_key"
          chmod 600 "$app_store_private_key"
          echo "FIELDWORK_APP_STORE_PRIVATE_KEY_PATH=$app_store_private_key" >> "$GITHUB_ENV"
          xcrun altool --upload-app \
            --type ios \
            --file build/export/Fieldwork.ipa \
            --apiKey "$key_id" \
            --apiIssuer "$issuer_id"
      - name: Clean iOS signing and upload assets
        if: always()
        run: |
          if [ -n "${FIELDWORK_IOS_KEYCHAIN:-}" ]; then
            security delete-keychain "$FIELDWORK_IOS_KEYCHAIN" || true
          fi
          rm -f \
            "$RUNNER_TEMP/fieldwork-ios-distribution.p12" \
            "$RUNNER_TEMP/fieldwork.mobileprovision" \
            "$RUNNER_TEMP/fieldwork-profile.plist" \
            "$RUNNER_TEMP/fieldwork-app-store-key.json" \
            "${FIELDWORK_APP_STORE_PRIVATE_KEY_PATH:-}" \
            ExportOptions.plist
