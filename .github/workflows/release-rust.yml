name: Release Rust Artifacts

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.package }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            package: darwin-arm64
            build: cargo
          - os: macos-14
            target: x86_64-apple-darwin
            package: darwin-x64
            build: cargo
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            package: linux-arm64
            build: zigbuild
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            package: linux-x64
            build: zigbuild

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install zigbuild
        if: matrix.build == 'zigbuild'
        run: cargo install cargo-zigbuild --locked

      - name: Install Zig
        if: matrix.build == 'zigbuild'
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2

      - name: Build Darwin
        if: matrix.build == 'cargo'
        run: cargo build --release --target ${{ matrix.target }} -p shelly-cli -p shelly-daemon -p shelly-relay

      - name: Build Linux
        if: matrix.build == 'zigbuild'
        run: cargo zigbuild --release --target ${{ matrix.target }} -p shelly-cli -p shelly-daemon -p shelly-relay

      - name: Ad-hoc sign Darwin CLI and daemon
        if: startsWith(matrix.target, 'aarch64-apple') || startsWith(matrix.target, 'x86_64-apple')
        run: |
          for binary in shelly shellyd; do
            chmod 755 "target/${{ matrix.target }}/release/$binary"
            codesign --force --sign - "target/${{ matrix.target }}/release/$binary"
            codesign --verify --verbose=2 "target/${{ matrix.target }}/release/$binary"
          done

      - name: Stage archive
        run: |
          mkdir -p dist/shelly-${{ matrix.package }}
          cp target/${{ matrix.target }}/release/shelly dist/shelly-${{ matrix.package }}/shelly
          cp target/${{ matrix.target }}/release/shellyd dist/shelly-${{ matrix.package }}/shellyd
          cp target/${{ matrix.target }}/release/shelly-relay dist/shelly-${{ matrix.package }}/shelly-relay
          chmod 755 dist/shelly-${{ matrix.package }}/shelly dist/shelly-${{ matrix.package }}/shellyd dist/shelly-${{ matrix.package }}/shelly-relay
          tar -C dist -czf shelly-${{ matrix.package }}.tar.gz shelly-${{ matrix.package }}
          LC_ALL=C LANG=C shasum -a 256 shelly-${{ matrix.package }}.tar.gz > shelly-${{ matrix.package }}.tar.gz.sha256
          cat > shelly-${{ matrix.package }}.predicate.json <<EOF
          {
            "_type": "https://slsa.dev/provenance/v1",
            "buildDefinition": {
              "buildType": "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release-rust.yml",
              "externalParameters": {
                "releaseTag": "${GITHUB_REF_NAME}",
                "package": "${{ matrix.package }}",
                "target": "${{ matrix.target }}",
                "sha256": "$(cut -d ' ' -f 1 shelly-${{ matrix.package }}.tar.gz.sha256)"
              },
              "internalParameters": {}
            },
            "runDetails": {
              "builder": {
                "id": "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
              },
              "metadata": {
                "invocationId": "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
              }
            }
          }
          EOF

      - name: Attest archive
        run: |
          cosign attest-blob \
            --yes \
            --predicate shelly-${{ matrix.package }}.predicate.json \
            --type slsaprovenance1 \
            --bundle shelly-${{ matrix.package }}.tar.gz.bundle \
            shelly-${{ matrix.package }}.tar.gz

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shelly-${{ matrix.package }}
          path: |
            shelly-${{ matrix.package }}.tar.gz
            shelly-${{ matrix.package }}.tar.gz.sha256
            shelly-${{ matrix.package }}.tar.gz.bundle
          if-no-files-found: error

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            shelly-${{ matrix.package }}.tar.gz
            shelly-${{ matrix.package }}.tar.gz.sha256
            shelly-${{ matrix.package }}.tar.gz.bundle
          generate_release_notes: true
