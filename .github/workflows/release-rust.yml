name: Release Rust Artifacts

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.package }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            package: darwin-arm64
            build: cargo
          - os: macos-14
            target: x86_64-apple-darwin
            package: darwin-x64
            build: cargo
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            package: linux-arm64
            build: zigbuild
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            package: linux-x64
            build: zigbuild

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Install zigbuild
        if: matrix.build == 'zigbuild'
        run: cargo install cargo-zigbuild --locked

      - name: Install Zig
        if: matrix.build == 'zigbuild'
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2

      - name: Build Darwin
        if: matrix.build == 'cargo'
        run: cargo build --release --target ${{ matrix.target }} -p fieldwork-cli -p fieldwork-daemon -p fieldwork-relay

      - name: Build Linux
        if: matrix.build == 'zigbuild'
        run: cargo zigbuild --release --target ${{ matrix.target }} -p fieldwork-cli -p fieldwork-daemon -p fieldwork-relay

      - name: Ad-hoc sign Darwin CLI and daemon
        if: startsWith(matrix.target, 'aarch64-apple') || startsWith(matrix.target, 'x86_64-apple')
        run: |
          for binary in fieldwork fieldworkd; do
            chmod 755 "target/${{ matrix.target }}/release/$binary"
            codesign --force --sign - "target/${{ matrix.target }}/release/$binary"
            codesign --verify --verbose=2 "target/${{ matrix.target }}/release/$binary"
          done

      - name: Stage archive
        run: |
          mkdir -p dist/fieldwork-${{ matrix.package }}
          cp target/${{ matrix.target }}/release/fieldwork dist/fieldwork-${{ matrix.package }}/fieldwork
          cp target/${{ matrix.target }}/release/fieldworkd dist/fieldwork-${{ matrix.package }}/fieldworkd
          cp target/${{ matrix.target }}/release/fieldwork-relay dist/fieldwork-${{ matrix.package }}/fieldwork-relay
          chmod 755 dist/fieldwork-${{ matrix.package }}/fieldwork dist/fieldwork-${{ matrix.package }}/fieldworkd dist/fieldwork-${{ matrix.package }}/fieldwork-relay
          tar -C dist -czf fieldwork-${{ matrix.package }}.tar.gz fieldwork-${{ matrix.package }}
          LC_ALL=C LANG=C shasum -a 256 fieldwork-${{ matrix.package }}.tar.gz > fieldwork-${{ matrix.package }}.tar.gz.sha256
          cat > fieldwork-${{ matrix.package }}.predicate.json <<EOF
          {
            "_type": "https://slsa.dev/provenance/v1",
            "buildDefinition": {
              "buildType": "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release-rust.yml",
              "externalParameters": {
                "releaseTag": "${GITHUB_REF_NAME}",
                "package": "${{ matrix.package }}",
                "target": "${{ matrix.target }}",
                "sha256": "$(cut -d ' ' -f 1 fieldwork-${{ matrix.package }}.tar.gz.sha256)"
              },
              "internalParameters": {}
            },
            "runDetails": {
              "builder": {
                "id": "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
              },
              "metadata": {
                "invocationId": "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
              }
            }
          }
          EOF

      - name: Attest archive
        run: |
          cosign attest-blob \
            --yes \
            --predicate fieldwork-${{ matrix.package }}.predicate.json \
            --type slsaprovenance1 \
            --bundle fieldwork-${{ matrix.package }}.tar.gz.bundle \
            fieldwork-${{ matrix.package }}.tar.gz

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fieldwork-${{ matrix.package }}
          path: |
            fieldwork-${{ matrix.package }}.tar.gz
            fieldwork-${{ matrix.package }}.tar.gz.sha256
            fieldwork-${{ matrix.package }}.tar.gz.bundle
          if-no-files-found: error

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            fieldwork-${{ matrix.package }}.tar.gz
            fieldwork-${{ matrix.package }}.tar.gz.sha256
            fieldwork-${{ matrix.package }}.tar.gz.bundle
          generate_release_notes: true
