name: Deploy Relay

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-relay.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/protocol/**"
      - "crates/relay/**"
      - "infra/lightsail/**"
      - "infra/relay/**"
      - "rust-toolchain.toml"
      - "scripts/check-infra-terraform.sh"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-relay
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  LIGHTSAIL_INSTANCE: dock-relay

jobs:
  deploy:
    name: Deploy dock relay
    runs-on: ubuntu-24.04
    environment: relay-production
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: relay-linux-x64
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.RELAY_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: shelly-dock-relay-deploy

      - name: Install Ansible
        run: python3 -m pip install --user ansible

      - name: Verify relay deploy prerequisites
        env:
          RELAY_SSH_KEY: ${{ secrets.RELAY_SSH_KEY }}
          RELAY_KNOWN_HOSTS: ${{ secrets.RELAY_KNOWN_HOSTS }}
          RELAY_AWS_ROLE_ARN: ${{ vars.RELAY_AWS_ROLE_ARN }}
        run: |
          if [ -z "$RELAY_AWS_ROLE_ARN" ]; then
            echo "RELAY_AWS_ROLE_ARN repository variable is required to manage the temporary Lightsail SSH allowlist."
            exit 1
          fi
          if [ -z "$RELAY_SSH_KEY" ]; then
            echo "RELAY_SSH_KEY is required to deploy the relay."
            exit 1
          fi
          if [ -z "$RELAY_KNOWN_HOSTS" ]; then
            echo "RELAY_KNOWN_HOSTS (ssh-keyscan output for dock-relay) is required so strict host-key checking can pass on a fresh runner."
            exit 1
          fi
          if ! grep -Ev '^\s*(#|$|\[)' infra/relay/ansible/inventory.ini | grep -q .; then
            echo "infra/relay/ansible/inventory.ini must contain at least one relay host before deployment."
            exit 1
          fi

      - name: Build relay
        run: cargo build --release -p shelly-relay

      - name: Capture runner IP
        run: |
          runner_ip="$(curl -fsS --max-time 10 https://checkip.amazonaws.com | tr -d '\n')"
          if ! printf '%s\n' "$runner_ip" | grep -Eq '^[0-9]+(\.[0-9]+){3}$'; then
            echo "Could not determine a valid IPv4 address for this runner: $runner_ip"
            exit 1
          fi
          echo "RUNNER_CIDR=$runner_ip/32" >> "$GITHUB_ENV"

      - name: Open relay SSH for this runner
        run: |
          aws lightsail open-instance-public-ports \
            --region "$AWS_REGION" \
            --instance-name "$LIGHTSAIL_INSTANCE" \
            --port-info "{\"fromPort\":22,\"toPort\":22,\"protocol\":\"tcp\",\"cidrs\":[\"$RUNNER_CIDR\"]}"

      - name: Write SSH key and known hosts
        env:
          RELAY_SSH_KEY: ${{ secrets.RELAY_SSH_KEY }}
          RELAY_KNOWN_HOSTS: ${{ secrets.RELAY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          echo "$RELAY_SSH_KEY" > ~/.ssh/shelly-relay
          chmod 600 ~/.ssh/shelly-relay
          echo "$RELAY_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Deploy with Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "true"
          RELAY_FCM_SERVICE_ACCOUNT: ${{ secrets.RELAY_FCM_SERVICE_ACCOUNT }}
        run: |
          fcm_args=()
          if [ -n "$RELAY_FCM_SERVICE_ACCOUNT" ]; then
            umask 077
            printf '%s' "$RELAY_FCM_SERVICE_ACCOUNT" > "$RUNNER_TEMP/fcm-service-account.json"
            fcm_args=(-e "fcm_credential_src=$RUNNER_TEMP/fcm-service-account.json" -e "shelly_relay_fcm_credential=/etc/shelly/secrets/fcm-service-account.json")
          fi
          ansible-playbook \
            -i infra/relay/ansible/inventory.ini \
            --private-key ~/.ssh/shelly-relay \
            infra/relay/ansible/playbook.yml \
            -e shelly_relay_binary="$PWD/target/release/shelly-relay" \
            "${fcm_args[@]}"

      - name: Close relay SSH for this runner
        if: always() && env.RUNNER_CIDR != ''
        run: |
          aws lightsail close-instance-public-ports \
            --region "$AWS_REGION" \
            --instance-name "$LIGHTSAIL_INSTANCE" \
            --port-info "{\"fromPort\":22,\"toPort\":22,\"protocol\":\"tcp\",\"cidrs\":[\"$RUNNER_CIDR\"]}" || true

      - name: Clean relay SSH key
        if: always()
        run: rm -f ~/.ssh/shelly-relay
