name: Deploy Relay

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag containing fieldwork-relay artifact"
        required: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy relay fleet
    runs-on: ubuntu-24.04
    environment: relay-production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Install Ansible
        run: python3 -m pip install --user ansible
      - name: Verify relay deploy prerequisites
        env:
          RELAY_SSH_KEY: ${{ secrets.RELAY_SSH_KEY }}
          RELAY_KNOWN_HOSTS: ${{ secrets.RELAY_KNOWN_HOSTS }}
        run: |
          if [ -z "$RELAY_SSH_KEY" ]; then
            echo "RELAY_SSH_KEY is required to deploy the relay fleet."
            exit 1
          fi
          if [ -z "$RELAY_KNOWN_HOSTS" ]; then
            echo "RELAY_KNOWN_HOSTS (ssh-keyscan output for the relay hosts) is required so strict host-key checking can pass on a fresh runner."
            exit 1
          fi
          if ! grep -Ev '^\s*(#|$|\[)' infra/relay/ansible/inventory.ini | grep -q .; then
            echo "infra/relay/ansible/inventory.ini must contain at least one relay host before deployment."
            exit 1
          fi
      - name: Download relay artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          gh release download "${{ inputs.tag }}" \
            --pattern 'fieldwork-linux-arm64.tar.gz' \
            --pattern 'fieldwork-linux-arm64.tar.gz.sha256' \
            --pattern 'fieldwork-linux-arm64.tar.gz.bundle' \
            --dir artifacts
          (cd artifacts && shasum -a 256 -c fieldwork-linux-arm64.tar.gz.sha256)
          cosign verify-blob-attestation \
            --bundle artifacts/fieldwork-linux-arm64.tar.gz.bundle \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/fieldwork-app/fieldwork/\.github/workflows/release-rust\.yml@' \
            --type slsaprovenance1 \
            artifacts/fieldwork-linux-arm64.tar.gz
          tar -xzf artifacts/fieldwork-linux-arm64.tar.gz -C artifacts
          test -x artifacts/fieldwork-linux-arm64/fieldwork-relay
      - name: Write SSH key and known hosts
        env:
          RELAY_SSH_KEY: ${{ secrets.RELAY_SSH_KEY }}
          RELAY_KNOWN_HOSTS: ${{ secrets.RELAY_KNOWN_HOSTS }}
        run: |
          if [ -z "$RELAY_SSH_KEY" ]; then
            echo "RELAY_SSH_KEY is required to deploy the relay fleet."
            exit 1
          fi
          install -m 700 -d ~/.ssh
          echo "$RELAY_SSH_KEY" > ~/.ssh/fieldwork-relay
          chmod 600 ~/.ssh/fieldwork-relay
          echo "$RELAY_KNOWN_HOSTS" > ~/.ssh/known_hosts
      - name: Deploy with Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "true"
        run: |
          ansible-playbook \
            -i infra/relay/ansible/inventory.ini \
            --private-key ~/.ssh/fieldwork-relay \
            infra/relay/ansible/playbook.yml \
            -e fieldwork_relay_binary="$PWD/artifacts/fieldwork-linux-arm64/fieldwork-relay"
      - name: Clean relay SSH key
        if: always()
        run: rm -f ~/.ssh/fieldwork-relay
