name: Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cloudflare-pages:
    name: Cloudflare Pages
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify Cloudflare credentials
        id: cloudflare-preflight
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
              echo "Cloudflare Pages credentials are required to deploy fieldwork.dev."
              exit 1
            fi
            echo "Cloudflare Pages credentials are required to deploy fieldwork.dev."
            echo "Skipping Cloudflare Pages deploy for this push."
            echo "skip_deploy=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip_deploy=0" >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@v4
        if: steps.cloudflare-preflight.outputs.skip_deploy != '1'
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        if: steps.cloudflare-preflight.outputs.skip_deploy != '1'
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - run: pnpm --dir site install --ignore-workspace --frozen-lockfile
        if: steps.cloudflare-preflight.outputs.skip_deploy != '1'
      - run: pnpm build:site
        if: steps.cloudflare-preflight.outputs.skip_deploy != '1'
      - name: Deploy
        if: steps.cloudflare-preflight.outputs.skip_deploy != '1'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name fieldwork-dev --branch main
