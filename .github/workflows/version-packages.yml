name: Version Packages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  changesets:
    name: Open Changesets version PR
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/verify-changesets-config.mjs
      - name: Open version packages PR
        uses: changesets/action@v1
        with:
          version: pnpm --package @changesets/cli@2.29.7 --package @changesets/changelog-github@0.5.1 dlx changeset version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
