name: Release npm Packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to download artifacts from"
        required: true
  workflow_run:
    workflows: ["Release Rust Artifacts"]
    types: [completed]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm packages
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Resolve expected release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify package version matches release tag
        run: |
          tag="${{ steps.release_tag.outputs.tag }}"
          case "$tag" in
            v[0-9]*) ;;
            *) echo "expected a vX.Y.Z release tag, got: $tag" >&2; exit 1 ;;
          esac
          version=$(node -p "require('./packages/cli/package.json').version")
          if [ "v$version" != "$tag" ]; then
            echo "packages/cli version v$version does not match release tag $tag" >&2
            exit 1
          fi

      - name: Verify npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is required to publish Shelly npm packages."
            exit 1
          fi

      - name: Download GitHub Release artifacts
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          gh release download "${{ inputs.tag }}" \
            --pattern 'shelly-*.tar.gz' \
            --pattern 'shelly-*.tar.gz.sha256' \
            --pattern 'shelly-*.tar.gz.bundle' \
            --dir artifacts

      - name: Download Rust workflow artifacts
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          gh run download "${{ github.event.workflow_run.id }}" \
            --pattern 'shelly-*' \
            --dir artifacts

      - name: Verify release artifact checksums
        run: |
          set -euo pipefail
          if ! find artifacts -name '*.tar.gz.sha256' | grep -q .; then
            echo "no .tar.gz.sha256 checksum files found under artifacts/" >&2
            exit 1
          fi
          find artifacts -name '*.tar.gz.sha256' -execdir shasum -a 256 -c {} +

      - name: Verify cosign attestations
        run: |
          set -euo pipefail
          repo_regex="$(printf '%s' "$GITHUB_REPOSITORY" | sed -e 's#[][.^$*+?{}()|\\]#\\&#g')"
          while IFS= read -r archive; do
            cosign verify-blob-attestation \
              --bundle "${archive}.bundle" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity-regexp "^https://github\.com/${repo_regex}/\.github/workflows/release-rust\.yml@" \
              --type slsaprovenance1 \
              "$archive"
          done < <(find artifacts -name '*.tar.gz')

      - name: Extract release archives
        run: |
          set -euo pipefail
          while IFS= read -r archive; do
            tar -xzf "$archive" -C artifacts
          done < <(find artifacts -name '*.tar.gz')
      - run: node scripts/prepare-npm-artifacts.mjs
      - name: Publish with provenance in dependency order
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish-npm-packages.mjs
